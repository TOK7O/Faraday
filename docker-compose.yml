services:
  db:
    image: postgres:alpine
    restart: always
    container_name: faraday-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: haslo123
      POSTGRES_DB: db
    volumes:
      - faraday_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - faraday-network

  backend:
    build:
      context: ./backend/Faraday.API
      dockerfile: Dockerfile
    container_name: faraday-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=db;Username=admin;Password=haslo123;
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    networks:
      - faraday-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: faraday-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - faraday-network

volumes:
  faraday_pg_data:

networks:
  faraday-network:
    driver: bridge